<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Data Matcher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/lucide@latest/dist/umd/lucide.css">
  <style>
    .dragover { border-color: #3b82f6 !important; background: #eff6ff !important; transform: scale(1.02); }
    .matched { border-left: 4px solid #10b981; }
    .error { border-left: 4px solid #ef4444; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-12 px-4">
  <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-3xl p-8">
    
    <!-- Header -->
    <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-2 flex items-center justify-center gap-3">
      📤 Form Data Matcher
    </h1>
    <p class="text-gray-600 text-center mb-12 text-lg">Upload Excel/CSV → Auto-match headers → Preview → Download Template</p>

    <!-- Upload Dropzone -->
    <div id="dropzone" class="border-4 border-dashed border-gray-300 rounded-3xl p-16 text-center cursor-pointer hover:border-gray-400 hover:shadow-xl transition-all mb-12 group">
      <svg class="w-20 h-20 mx-auto mb-6 text-gray-400 group-hover:text-gray-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
      </svg>
      <p class="text-2xl font-semibold mb-2 text-gray-700 group-hover:text-gray-900 transition">Drag & drop Excel/CSV here</p>
      <p class="text-lg text-gray-500">or click to browse files</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" class="hidden">
    </div>

    <!-- Header Mapping Section (Hidden Initially) -->
    <div id="mappingSection" class="hidden mb-12">
      <h2 class="text-3xl font-bold mb-8 flex items-center gap-3">
        🔗 Header Mapping
        <span id="statusBadge" class="px-4 py-2 rounded-full text-sm font-bold bg-red-100 text-red-800">X Missing</span>
      </h2>
      <div id="mappingList" class="grid gap-4 max-h-96 overflow-auto p-6 bg-gray-50 rounded-2xl border-2 border-gray-100"></div>
    </div>

    <!-- Preview Section (Hidden Initially) -->
    <div id="previewSection" class="hidden mb-12">
      <h2 class="text-3xl font-bold mb-6">📊 Data Preview (First 5 Rows)</h2>
      <div class="overflow-x-auto bg-gray-50 rounded-2xl p-6 border-2 border-gray-100">
        <table id="previewTable" class="w-full border-collapse bg-white rounded-xl overflow-hidden shadow-sm">
          <!-- Dynamic content -->
        </table>
      </div>
    </div>

    <!-- Action Buttons (Hidden Initially) -->
    <div id="actions" class="hidden flex flex-wrap gap-6 pt-12 border-t-4 border-blue-100 justify-center">
      <button id="downloadTemplate" class="flex items-center gap-3 px-10 py-5 bg-gradient-to-r from-green-500 to-green-600 text-white font-bold rounded-2xl shadow-xl hover:shadow-2xl hover:scale-105 hover:from-green-600 hover:to-green-700 transition-all text-lg">
        💾 Download Template.xlsx
      </button>
      <button id="submitBtn" class="flex items-center gap-3 px-10 py-5 bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold rounded-2xl shadow-xl hover:shadow-2xl hover:scale-105 hover:from-blue-600 hover:to-indigo-700 transition-all text-lg">
        ✅ Submit Mapped Data
      </button>
    </div>
  </div>

  <script>
    // Step 1: Define exact headers from your Playwright form
    const REQUIRED_HEADERS = [
      "2. DCA Email AddressRequired",
      "Account NameRequired to answer", 
      "8. Loan Account",
      "13. Client Contact",
      "18. PTP AmountRequired to",
      "19. Negotiation",
      "22. New Contact",
      "22. New Email AddressRequired"
    ];

    let fileData = [], headers = [], mapping = {}, previewRows = [];

    // Step 2: Dropzone setup
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      fileInput.files = e.dataTransfer.files;
      handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    // Step 3: File processing
    function handleFile(file) {
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        fileData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
        
        headers = fileData[0] || [];
        previewRows = fileData.slice(1, 6);
        
        autoMapHeaders();
        renderMapping();
        renderPreview();
        showSections();
      };
      reader.readAsArrayBuffer(file);
    }

    // Step 4: Auto header matching
    function autoMapHeaders() {
      mapping = {};
      REQUIRED_HEADERS.forEach(req => {
        const match = headers.find(h => 
          (h || '').toLowerCase().includes(req.toLowerCase().slice(-8)) ||  // Match key words
          req.toLowerCase().includes((h || '').toLowerCase())
        );
        mapping[req] = match || '';
      });
      updateStatus();
    }

    // Step 5: Render mapping UI
    function renderMapping() {
      const container = document.getElementById('mappingList');
      container.innerHTML = REQUIRED_HEADERS.map(req => `
        <div class="flex items-center gap-4 p-6 bg-white border-2 rounded-2xl hover:shadow-md transition-all ${mapping[req] ? 'matched' : 'error'}">
          <span class="font-bold min-w-[300px] text-gray-800">${req}</span>
          <select onchange="updateMapping('${req}', this.value)" class="flex-1 p-4 border-2 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-500 font-medium text-lg">
            <option value="">No match found</option>
            ${headers.map(h => `<option value="${h}" ${mapping[req] === h ? 'selected' : ''}>${h}</option>`).join('')}
          </select>
          ${mapping[req] ? '<svg class="w-8 h-8 text-green-500 ml-auto" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>' : '<svg class="w-8 h-8 text-red-500 ml-auto" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>'}
        </div>
      `).join('');
    }

    // Step 6: Update single mapping
    function updateMapping(required, fileHeader) {
      mapping[required] = fileHeader;
      updateStatus();
      renderMapping();
    }

    // Step 7: Status & validation
    function updateStatus() {
      const missing = REQUIRED_HEADERS.filter(r => !mapping[r]);
      const badge = document.getElementById('statusBadge');
      badge.textContent = `${missing.length} Missing`;
      badge.className = `px-4 py-2 rounded-full text-sm font-bold ${missing.length ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`;
    }

    // Step 8: Render preview table
    function renderPreview() {
      const table = document.getElementById('previewTable');
      const thead = table.createTHead();
      const tbody = table.createTBody();
      
      // Headers (first 8 cols)
      const theadRow = thead.insertRow();
      headers.slice(0, 8).forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        th.className = 'border-b-4 border-gray-300 p-5 text-left font-bold bg-gradient-to-r from-gray-100 to-gray-200';
        theadRow.appendChild(th);
      });
      
      // Data rows
      previewRows.forEach(row => {
        const tr = tbody.insertRow();
        row.slice(0, 8).forEach(cell => {
          const td = tr.insertCell();
          td.textContent = cell;
          td.className = 'p-5 border-b border-gray-200 hover:bg-gray-50';
        });
      });
    }

    // Step 9: Show sections after upload
    function showSections() {
      document.getElementById('mappingSection').classList.remove('hidden');
      document.getElementById('previewSection').classList.remove('hidden');
      document.getElementById('actions').classList.remove('hidden');
    }

    // Step 10: Download template
    document.getElementById('downloadTemplate').addEventListener('click', () => {
      const ws = XLSX.utils.json_to_sheet([REQUIRED_HEADERS]);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Form_Template');
      XLSX.writeFile(wb, 'Form_Template.xlsx');
    });

    // Step 11: Submit (console log mapped data - ready for API)
    document.getElementById('submitBtn').addEventListener('click', () => {
      const mappedData = fileData.slice(1).map(row => {
        const mappedRow = {};
        REQUIRED_HEADERS.forEach(req => {
          const colIndex = headers.indexOf(mapping[req]);
          mappedRow[req] = colIndex >= 0 ? row[colIndex] : '';
        });
        return mappedRow;
      });
      console.log('✅ Mapped Data Ready:', mappedData);
      alert(`Success! ${mappedData.length} rows mapped.\nCheck console for JSON.\nReady for Playwright batch submit.`);
    });
  </script>
</body>
</html>
